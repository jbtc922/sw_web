    <link rel="stylesheet" href="css/style.css" />

    <style>
        /* 떠다니는 버튼 */
        .floating-call-btn {
          position: fixed;
          right: 60px;
          bottom: 30px;
          width: 100px;
          height: 100px;
          background: rgba(0, 0, 0, 0.5); /* 반투명 */
          color: #fff;
          border-radius: 50%;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 40px;
          cursor: pointer;
          z-index: 9999;
          transition: 0.3s;
        }

         @media (max-width: 768px) {
            .floating-call-btn {
              position: fixed;
              right: 20px;
              bottom: 30px;
              width: 60px;
              height: 60px;
              background: rgba(0, 0, 0, 0.5); /* 반투명 */
              color: #fff;
              border-radius: 50%;
              display: flex;
              justify-content: center;
              align-items: center;
              font-size: 24px;
              cursor: pointer;
              z-index: 9999;
              transition: 0.3s;
            }
        }


        .floating-call-btn:hover {
          background: rgba(0, 0, 0, 0.8);
        }

        /* 팝업 배경 */
        .popup-bg {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0,0,0,0.6);
          z-index: 9998;
        }

        /* 팝업 박스 */
        .popup-box {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: #fff;
          padding: 30px;
          border-radius: 10px;
          text-align: center;
          width: 300px;
        }

        .popup-box button {
          margin-top: 15px;
          padding: 8px 15px;
          cursor: pointer;
        }
    </style>

</head>
